server {
    listen 80;
    listen [::]:80;

    # >>> CHANGE THIS to your domain (e.g. misskhalifa.example.com)
    server_name misskhalifa.eccugenai.app;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (Flask/gunicorn). The backend serves routes under /api/v1/…,
    # so this passes the /api/ prefix straight through.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OpenAI round-trips can be slow; allow generous timeouts.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
